# Builds the static Storybook (packages/design-system-storybook/Dockerfile) and serves it.
# The Dockerfile COPYs repo-root workspace files, so the build context must be the repo root.
services:
  storybook:
    build:
      context: ../..
      dockerfile: packages/design-system-storybook/Dockerfile
    container_name: igrp-design-system-storybook
    ports:
      - '6006:6006'
    restart: unless-stopped
