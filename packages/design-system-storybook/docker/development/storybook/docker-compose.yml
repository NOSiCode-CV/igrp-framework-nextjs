version: '3.8'

services:
  storybook-dev:
    build:
      context: .
      dockerfile: docker/development/storybook/Dockerfile
    container_name: igrp-design-system-storybook
    ports:
      - '6006:6006'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
