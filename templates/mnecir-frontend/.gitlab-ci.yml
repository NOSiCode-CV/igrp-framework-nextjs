####### DEV PIPELINE ######

image: docker:28.1.1
services:
  - name: docker:28.1.1-dind
    command: ['--tls=false', '--mtu=1240']
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ''
  DOCKER_HOST: tcp://docker:2375
  DOCKER_REGISTRY: registry.nosi.cv
  DOCKER_PROJECT: mnecir
  IMAGE_NAME: frontend-stage
stages:
  - build
  - deploy
build_docker_image:
  stage: build
  only:
    - dev
  script:
    - docker login $DOCKER_REGISTRY -u $REGISTRY_USERNAME -p $REGISTRY_PASSWORD
    - docker build -t $DOCKER_REGISTRY/$DOCKER_PROJECT/$IMAGE_NAME .
    - docker tag $DOCKER_REGISTRY/$DOCKER_PROJECT/$IMAGE_NAME $DOCKER_REGISTRY/$DOCKER_PROJECT/$IMAGE_NAME:$CI_PIPELINE_ID
    - docker push $DOCKER_REGISTRY/$DOCKER_PROJECT/$IMAGE_NAME
    - docker push $DOCKER_REGISTRY/$DOCKER_PROJECT/$IMAGE_NAME:$CI_PIPELINE_ID
deploy:
  image: gcc:latest
  stage: deploy
  only:
    - dev
  script:
    - |
      curl -u "$DEPLOY_USER:$DEPLOY_PASSWORD" \
        -X POST \
        -H 'Accept: application/json' \
        -H 'Content-Type: application/json' \
        'https://manager.nosi.cv/v3/project/c-kthdc:p-tn7qs/workloads/deployment:mnecir-stage:frontend-stage?action=redeploy'
